services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER must be set}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB must be set}
    volumes:
      - pg_data:/var/lib/postgresql/data
    # Bind to loopback only by default — override DB_PORT_BIND=0.0.0.0 if you
    # explicitly need remote access. Exposing 5432 on all interfaces in a
    # compose file is a common accidental-leak pattern.
    ports:
      - "${DB_PORT_BIND:-127.0.0.1}:${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10

  server:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL must be set}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:8081}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      PORT: ${PORT:-3000}
      NODE_ENV: production
    ports:
      - "${PORT:-3000}:3000"

volumes:
  pg_data:
